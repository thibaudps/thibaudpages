<!DOCTYPE html>
<html lang="fr">
<head>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thibaud Pages | En Construction</title>
    <style>
        :root {
            --bg-color: #fdfff5;
            --text-color: #1a1a1a;
            --accent-color: #555555;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            text-align: center;

            <script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });
  }
</script>
        }

        .container {
            max-width: 600px;
            padding: 20px;
        }

        .logo {
            max-width: 200px;
            height: auto;
            margin-bottom: 40px;
            /* Petit effet d'entrée en douceur */
            animation: fadeIn 1.5s ease-in-out;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .content {
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .lang-block {
            margin-bottom: 20px;
        }

        .instagram-link {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: var(--text-color);
            font-weight: bold;
            border-bottom: 1px solid var(--text-color);
            padding-bottom: 2px;
            transition: all 0.3s ease;
        }

        .instagram-link:hover {
            color: var(--accent-color);
            border-bottom-color: var(--accent-color);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.2rem; }
            .logo { max-width: 150px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo rond.svg" alt="Thibaud Pages Logo" class="logo">

        <div class="content">
            <div class="lang-block">
                <h1>Site en reconstruction</h1>
                <p>Le nouveau site arrive très bientôt. En attendant, suivez mon travail sur Instagram.</p>
            </div>

            <hr style="width: 30px; border: 0.5px solid #eee; margin: 30px auto;">

            <div class="lang-block">
                <h1>Under Construction</h1>
                <p>The new website is coming soon. In the meantime, follow my work on Instagram.</p>
            </div>
        </div>

        <a href="https://www.instagram.com/thibaudpagesdesigns/" class="instagram-link" target="_blank">
            @thibaudpagesdesigns
        </a>
    </div>

</body>
</html>
