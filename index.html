<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thibaud Pages | En Construction</title>
    <style>
        :root {
            --bg-color: #fdfff5;
            --text-color: #1a1a1a;
            --accent-color: #555555;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 20px;
        }

        .logo {
            max-width: 200px;
            height: auto;
            margin-bottom: 40px;
            /* Petit effet d'entrée en douceur */
            animation: fadeIn 1.5s ease-in-out;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .content {
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .lang-block {
            margin-bottom: 20px;
        }

        .instagram-link {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: var(--text-color);
            font-weight: bold;
            border-bottom: 1px solid var(--text-color);
            padding-bottom: 2px;
            transition: all 0.3s ease;
        }

        .instagram-link:hover {
            color: var(--accent-color);
            border-bottom-color: var(--accent-color);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.2rem; }
            .logo { max-width: 150px; }
        }
    </style>
</head>
