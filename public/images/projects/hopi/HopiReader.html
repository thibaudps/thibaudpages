<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Book Reader</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: transparent; --gold: oklch(70% 0.11 78); }
  body {
    background: var(--bg); color: transparent;
    height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0; padding: 0;
    font-family: Georgia, serif;
    overflow: hidden;
  }

  /* Galerie */
  .gallery-intro { text-align: center; }
  .gallery-intro h1 { font-size: 2rem; font-weight: 400; letter-spacing: -0.02em; margin-bottom: 8px; }
  .gallery-intro p { font-size: 0.9rem; color: #78716c; }
  .gallery { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
  .book-thumb-card {
    cursor: pointer; position: relative;
    border-radius: 3px; overflow: hidden;
    box-shadow: 4px 8px 32px rgba(0,0,0,0.5);
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .book-thumb-card:hover { transform: translateY(-6px) scale(1.02); box-shadow: 4px 16px 48px rgba(0,0,0,0.7); }
  .book-thumb-card img { display: block; width: 100%; height: 100%; object-fit: cover; }
  .book-thumb-cover {
    width: 100%; height: 100%;
    background: transparent;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
  }
  .book-thumb-cover::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 8px;
    background: transparent;
  }
  .book-thumb-title { font-size: 1rem; color: var(--gold); text-align: center; padding: 0 20px; line-height: 1.3; }
  .book-thumb-sub { font-size: 0.65rem; color: rgba(255,255,255,0.3); letter-spacing: 0.14em; text-transform: uppercase; }
  .book-thumb-hover {
    position: absolute; inset: 0; background: transparent;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.3s;
  }
  .book-thumb-card:hover .book-thumb-hover { background: transparent; }
  .book-thumb-hover span { opacity: 0; font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; transition: opacity 0.3s; }
  .book-thumb-card:hover .book-thumb-hover span { opacity: 1; }

  /* Modal */
  .modal {
    position: fixed; inset: 0; background: transparent;
    z-index: 100; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    backdrop-filter: blur(10px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.35s ease;
    padding: 24px 16px 16px; gap: 16px;
  }
  .modal.open { opacity: 1; pointer-events: all; }
  .modal-close {
    position: fixed; top: 20px; right: 24px;
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    background: transparent;
    color: rgba(255,255,255,0.6); font-size: 16px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .modal-close:hover { background: transparent; color: white; }

  /* Livre */
  .book-wrapper { display: flex; align-items: center; justify-content: center; gap: 16px; width: 100%; }
  .nav-btn {
    flex-shrink: 0; width: 40px; height: 40px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.12); background: rgba(255, 255, 255, 0);
    color: rgba(255,255,255,0.5); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.1); color: white; }
  .nav-btn:disabled { opacity: 0.15; cursor: not-allowed; }

  .book-scene { perspective: 2200px; position: relative; }
  .book-spread {
    width: var(--book-w); height: var(--book-h);
    position: relative; display: flex;
  }
  .spread-left {
    width: 50%; height: 100%; position: relative; overflow: hidden;
    border-radius: 3px 0 0 3px; box-shadow: -6px 0 20px rgba(0,0,0,0.5);
  }
  .spread-right {
    width: calc(50% + 1px); height: 100%; margin-left: -1px;
    position: relative; overflow: hidden;
    border-radius: 0 3px 3px 0; box-shadow: 6px 0 20px rgba(0,0,0,0.5);
  }
  .page-img { width: 100%; height: 100%; display: block; object-fit: cover; }
  .page-solid { width: 100%; height: 100%; }

  .book-info {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; color: rgba(255,255,255,0.28); font-size: 0.74rem;
  }
  .book-info strong { color: rgba(255,255,255,0.55); font-weight: 400; }
  .book-info .hint { font-size: 0.65rem; color: rgba(255,255,255,0.18); }

  .click-zone {
    position: absolute; top: 0; width: 18%; height: 100%; z-index: 5; cursor: pointer;
  }
  .click-zone.left { left: 0; } .click-zone.right { right: 0; }

  /* Fleches indicatrices de navigation. Placees a l'interieur des
     bords du livre, en legere transparence. pointer-events: none
     pour que les clics passent au-dessous (click-zone). */
  .page-hint {
    position: absolute;
    top: 50%;
    width: 38px;
    height: 38px;
    transform: translateY(-50%);
    opacity: 0.35;
    pointer-events: none;
    z-index: 6;
    color: #2e2720;
    animation: page-hint-pulse 2.4s ease-in-out infinite;
    transition: opacity 0.3s ease;
  }
  .page-hint.left  { left: 14px; }
  .page-hint.right { right: 14px; animation-delay: 1.2s; }
  .page-hint svg { width: 100%; height: 100%; display: block; }

  @keyframes page-hint-pulse {
    0%, 100% { opacity: 0.25; transform: translateY(-50%) translateX(0); }
    50%      { opacity: 0.55; transform: translateY(-50%) translateX(var(--hint-shift, 0)); }
  }
  .page-hint.left  { --hint-shift: -5px; }
  .page-hint.right { --hint-shift:  5px; }

  @media (max-width: 700px) {
    .page-hint { width: 30px; height: 30px; }
    .page-hint.left  { left: 8px; }
    .page-hint.right { right: 8px; }
  }
  @media (max-width: 480px) {
    .page-hint { width: 26px; height: 26px; }
    .page-hint.left  { left: 4px; }
    .page-hint.right { right: 4px; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ═══════════════════════════════════════════════════════════════════════════════
//  ██████╗ ██████╗ ███╗   ██╗███████╗██╗ ██████╗ ██╗   ██╗██████╗  █████╗
// ██╔════╝██╔═══██╗████╗  ██║██╔════╝██║██╔════╝ ██║   ██║██╔══██╗██╔══██╗
// ██║     ██║   ██║██╔██╗ ██║█████╗  ██║██║  ███╗██║   ██║██████╔╝███████║
// ██║     ██║   ██║██║╚██╗██║██╔══╝  ██║██║   ██║██║   ██║██╔══██╗██╔══██║
// ╚██████╗╚██████╔╝██║ ╚████║██║     ██║╚██████╔╝╚██████╔╝██║  ██║██║  ██║
//  ╚═════╝ ╚═════╝ ╚═╝  ╚═══╝╚═╝     ╚═╝ ╚═════╝  ╚═════╝ ╚═╝  ╚═╝╚═╝  ╚═╝
// ═══════════════════════════════════════════════════════════════════════════════
//
//  TOUT CE QUE VOUS DEVEZ MODIFIER EST ICI :
//
// ─── 1. FORMAT DU LIVRE ──────────────────────────────────────────────────────
//
//   Choisissez le ratio hauteur/largeur d'UNE page :
//     Carré        → 1.0
//     Portrait A4  → 1.41
//     Portrait A5  → 1.41  (même ratio)
//     Paysage      → 0.75
//
const BOOK_RATIO = 1;

// ─── 2. LIVRES DANS LA GALERIE ───────────────────────────────────────────────
//
//   Chaque livre a :
//     title       : titre affiché sur la vignette
//     subtitle    : sous-titre affiché sous le titre
//     thumbSrc    : chemin vers l'image de vignette (optionnel, sinon titre affiché)
//     pages       : tableau des pages dans l'ordre
//
//   Règles pour les pages :
//     - La PREMIÈRE page  = couverture   → affichée SEULE à droite
//     - La DERNIÈRE page  = 4e de couv   → affichée SEULE à gauche
//     - Toutes les autres = pages intérieures, assemblées 2 par 2
//       (page impaire = verso gauche, page paire = recto droite)
//
//   Chaque page :
//     src : chemin vers votre image  (ex: "images/page01.jpg")
//           OU null pour une page blanche
//     bg  : couleur de fond si pas d'image (ex: "#1a1612" pour sombre, "#faf8f3" pour blanc)
//
const BOOKS = [
  {
    title: "Mon Livre\nIllustré",
    subtitle: "Mon nom",
    thumbSrc: null, // Mettez ici l'image de vignette, ex: "images/thumb.jpg"
    pages: [
      // Couverture (seule, à droite)
      { src: "images/COUVERTURE.webp", bg: "#2e2720" },

      // Pages intérieures (assemblées 2 par 2)
      // Spread 1 : pages 1 (gauche) + 2 (droite)
      { src: "images/ARROSOIR.webp", bg: "#faf8f3" }, 
      { src: "images/BOTTES.webp", bg: "#faf8f3" }, 

      // Spread 2 : pages 3 (gauche) + 4 (droite)
      { src: "images/PISSENLIT.webp", bg: "#faf8f3" }, 
      { src: "images/CABANE.webp", bg: "#faf8f3" }, 

      // Spread 3
      { src: "images/HAMAC.webp", bg: "#faf8f3" }, 
      { src: "images/BARBECUE.webp", bg: "#faf8f3" }, 

      // Spread 4
      { src: "images/ABEILLE.webp", bg: "#faf8f3" }, 
      { src: "images/GAZON.webp", bg: "#faf8f3" }, 

      // Spread 5
      { src: "images/ESCARGOT.webp", bg: "#faf8f3" }, 
      { src: "images/TAUPE.webp", bg: "#faf8f3" }, 

      // Spread 6
      { src: "images/ROSIER.webp", bg: "#faf8f3" }, 
      { src: "images/BALANCOIRE.webp", bg: "#faf8f3" }, 

      // 4e de couverture (seule, à gauche)
      { src: null, bg: "#1a1612" },
    ],
  },

  // ── Ajoutez d'autres livres ici en copiant le bloc ci-dessus ──
  // {
  //   title: "Deuxième\nLivre",
  //   subtitle: "Mon nom",
  //   thumbSrc: null,
  //   pages: [ ... ],
  // },
];

// ═══════════════════════════════════════════════════════════════════════════════
//  FIN DE LA CONFIGURATION — ne pas modifier en dessous
// ═══════════════════════════════════════════════════════════════════════════════

// Taille du livre (responsive)
// Se base sur la hauteur de l'iframe (= hauteur dispo dans le modal)
// et adapte la largeur en conséquence pour le ratio choisi.
const BOOK_W = `min(calc(100vw - 40px), calc((100vh - 40px) * 2 / ${BOOK_RATIO}))`;
const BOOK_H = `calc(${BOOK_W} / 2 * ${BOOK_RATIO})`;

// Assemble les pages d'un livre en spreads
function buildSpreads(pages) {
  const spreads = [];
  // Couverture (index 0) → seule à droite
  spreads.push({ kind: 'cover', page: pages[0] });
  // Pages intérieures
  const inner = pages.slice(1, pages.length - 1);
  for (let i = 0; i < inner.length; i += 2) {
    spreads.push({ kind: 'spread', left: inner[i], right: inner[i+1] || { src: null, bg: '#faf8f3' } });
  }
  // 4e de couverture (dernière) → seule à gauche
  spreads.push({ kind: 'back', page: pages[pages.length - 1] });
  return spreads;
}

// Rendu d'une demi-page (image ou couleur unie)
function PageSlot({ page, style = {} }) {
  if (!page) return <div style={{ width: '100%', height: '100%', background: 'transparent', ...style }} />;
  if (page.src) {
    return <img src={page.src} alt="" className="page-img" style={style} />;
  }
  return <div className="page-solid" style={{ background: page.bg || 'transparent', ...style }} />;
}

// ─── Animation de tournage de page (CSS transition) ──────────────────────────
function FlipPage({ frontPage, backPage, direction, onComplete }) {
  const elRef = useRef(null);
  const onCompleteRef = useRef(onComplete);
  useEffect(() => { onCompleteRef.current = onComplete; }, [onComplete]);

  const startAngle = direction === 'forward' ?    0 : -180;
  const endAngle   = direction === 'forward' ? -180 :    0;

  useEffect(() => {
    const el = elRef.current;
    if (!el) return;
    el.style.transition = 'none';
    el.style.transform = `perspective(2200px) rotateY(${startAngle}deg)`;
    void el.offsetWidth; // force reflow
    el.style.transition = 'transform 680ms cubic-bezier(0.645, 0.045, 0.355, 1.000)';
    el.style.transform = `perspective(2200px) rotateY(${endAngle}deg)`;
    const onEnd = () => { clearTimeout(timeout); onCompleteRef.current?.(); };
    const timeout = setTimeout(onEnd, 720);
    el.addEventListener('transitionend', onEnd, { once: true });
    return () => { clearTimeout(timeout); el.removeEventListener('transitionend', onEnd); };
  }, []);

  const shadow = {
    position: 'absolute', inset: 0, pointerEvents: 'none',
  };

  return (
    <div ref={elRef} style={{
      position: 'absolute', top: 0, left: '50%',
      width: '50%', height: '100%',
      transformOrigin: 'left center',
      transformStyle: 'preserve-3d',
      zIndex: 10, pointerEvents: 'none',
    }}>
      {/* Face avant */}
      <div style={{ position: 'absolute', inset: 0, backfaceVisibility: 'hidden', WebkitBackfaceVisibility: 'hidden', overflow: 'hidden' }}>
        <PageSlot page={frontPage} />
        <div style={{ ...shadow, background: 'linear-gradient(to right, rgba(0,0,0,0.18) 0%, rgba(0,0,0,0.06) 25%, transparent 55%)' }} />
      </div>
      {/* Face arrière */}
      <div style={{ position: 'absolute', inset: 0, backfaceVisibility: 'hidden', WebkitBackfaceVisibility: 'hidden', transform: 'rotateY(180deg)', overflow: 'hidden' }}>
        <PageSlot page={backPage} />
        <div style={{ ...shadow, background: 'linear-gradient(to left, rgba(0,0,0,0.18) 0%, rgba(0,0,0,0.06) 25%, transparent 55%)' }} />
      </div>
    </div>
  );
}

// ─── Composant Livre ──────────────────────────────────────────────────────────
function Book({ book }) {
  const spreads = buildSpreads(book.pages);
  const total = spreads.length;
  const [idx, setIdx] = useState(0);
  const [flipping, setFlipping] = useState(null);
  const flipCounter = useRef(0);
  const flippingRef = useRef(null);
  const busy = flipping !== null;
  const cur = spreads[idx];

  useEffect(() => { flippingRef.current = flipping; }, [flipping]);

  const canFwd = idx < total - 1 && !busy;
  const canBck = idx > 0 && !busy;

  const goForward = useCallback(() => {
    if (!canFwd) return;
    const next = spreads[idx + 1];
    const fromPage = cur.kind === 'cover' ? cur.page : cur.kind === 'back' ? cur.page : cur.right;
    const toPage   = next.kind === 'back' ? next.page : next.kind === 'cover' ? next.page : next.left;
    flipCounter.current++;
    setFlipping({ direction: 'forward', fromIdx: idx, toIdx: idx + 1, fromPage, toPage });
  }, [canFwd, idx, cur, spreads]);

  const goBack = useCallback(() => {
    if (!canBck) return;
    const prev = spreads[idx - 1];
    const fromPage = cur.kind === 'back' ? cur.page : cur.kind === 'cover' ? cur.page : cur.left;
    const toPage   = prev.kind === 'cover' ? prev.page : prev.kind === 'back' ? prev.page : prev.right;
    flipCounter.current++;
    setFlipping({ direction: 'backward', fromIdx: idx, toIdx: idx - 1, fromPage, toPage });
  }, [canBck, idx, cur, spreads]);

  const onFlipDone = useCallback(() => {
    const f = flippingRef.current;
    if (f) {
      setIdx(f.toIdx);
      setFlipping(null);
      // Notifie le parent (portfolio) pour qu'il déclenche le préchargement
      // des spreads voisins. f.toIdx est l'index du NOUVEAU spread courant.
      if (window.parent !== window) {
        window.parent.postMessage({
          type: 'hopi:page-changed',
          currentPage: f.toIdx
        }, '*');
      }
    }
  }, []);

  useEffect(() => {
    const h = (e) => { if (e.key === 'ArrowRight') goForward(); if (e.key === 'ArrowLeft') goBack(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [goForward, goBack]);

  // ─── Communication parent (portfolio) : préchargement des pages voisines ─
  useEffect(() => {
    // 1. Annonce qu'on est prêt → le parent va répondre avec les pages
    //    à précharger en priorité (typiquement les 3 premiers spreads).
    if (window.parent !== window) {
      window.parent.postMessage({ type: 'hopi:ready' }, '*');
    }

    // 2. Écoute les demandes de préchargement venues du parent.
    //    Le parent envoie { type: 'hopi:preload-neighbors', pages: [...] }
    //    où chaque "page" est un index de spread à précharger.
    const onMessage = (event) => {
      const data = event.data;
      if (!data || data.type !== 'hopi:preload-neighbors') return;
      if (!Array.isArray(data.pages)) return;

      data.pages.forEach(spreadIdx => {
        // Garde-fou : index valide ?
        if (spreadIdx < 0 || spreadIdx >= spreads.length) return;
        const s = spreads[spreadIdx];
        if (!s) return;

        // Selon le type de spread, on précharge 1 ou 2 images
        const sources = [];
        if (s.kind === 'cover' || s.kind === 'back') {
          if (s.page && s.page.src) sources.push(s.page.src);
        } else if (s.kind === 'spread') {
          if (s.left  && s.left.src)  sources.push(s.left.src);
          if (s.right && s.right.src) sources.push(s.right.src);
        }

        // Précharge via new Image() — les images iront dans le cache navigateur
        sources.forEach(src => {
          const img = new Image();
          img.decoding = 'async';
          img.src = src;
        });
      });
    };

    window.addEventListener('message', onMessage);
    return () => window.removeEventListener('message', onMessage);
  }, [spreads]);

  const displaySpread = flipping ? spreads[flipping.fromIdx] : cur;
  const toSpread = flipping ? spreads[flipping.toIdx] : null;
  const isForward = !flipping || flipping.direction === 'forward';

  // Fond gauche = départ si forward, destination si backward
  // Fond droit  = destination si forward, départ si backward
  const leftSpread  = isForward ? displaySpread : (toSpread || displaySpread);
  const rightSpread = isForward ? (toSpread || displaySpread) : displaySpread;

  const leftPage  = leftSpread.kind === 'spread' ? leftSpread.left  : leftSpread.kind === 'back'  ? leftSpread.page : null;
  const rightPage = rightSpread.kind === 'spread' ? rightSpread.right : rightSpread.kind === 'cover' ? rightSpread.page : null;

  const leftHidden  = leftSpread.kind === 'cover';
  const rightHidden = rightSpread.kind === 'back';

  // FlipPage : forward → front=fromPage, back=toPage ; backward → inversé
  const flipFront = flipping ? (flipping.direction === 'forward' ? flipping.fromPage : flipping.toPage) : null;
  const flipBack  = flipping ? (flipping.direction === 'forward' ? flipping.toPage   : flipping.fromPage) : null;

  const label = idx === 0 ? 'Couverture'
    : idx === total - 1 ? '4e de couverture'
    : `Spread ${idx} / ${total - 2}`;

  return (
    <div className="book-scene" style={{ '--book-w': BOOK_W, '--book-h': BOOK_H }}>
      <div className="book-spread">
        <div className="spread-left" style={{ visibility: leftHidden ? 'hidden' : 'visible' }}>
          <PageSlot page={leftPage} />
        </div>
        <div className="spread-right" style={{ visibility: rightHidden ? 'hidden' : 'visible' }}>
          <PageSlot page={rightPage} />
        </div>
        {flipping && (
          <FlipPage
            key={flipCounter.current}
            frontPage={flipFront}
            backPage={flipBack}
            direction={flipping.direction}
            onComplete={onFlipDone}
          />
        )}
        {canBck && !busy && <div className="click-zone left" onClick={goBack} />}
        {canFwd && !busy && <div className="click-zone right" onClick={goForward} />}
        {canBck && React.createElement('div', { className: 'page-hint left', 'aria-hidden': 'true' },
          React.createElement('svg', { viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: '2', strokeLinecap: 'round', strokeLinejoin: 'round' },
            React.createElement('path', { d: 'M15 18l-6-6 6-6' })
          )
        )}
        {canFwd && React.createElement('div', { className: 'page-hint right', 'aria-hidden': 'true' },
          React.createElement('svg', { viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: '2', strokeLinecap: 'round', strokeLinejoin: 'round' },
            React.createElement('path', { d: 'M9 18l6-6-6-6' })
          )
        )}
      </div>
    </div>
  );
}

// ─── Modal ────────────────────────────────────────────────────────────────────
function Modal({ book, onClose }) {
  useEffect(() => {
    const h = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [onClose]);

  return (
    <div className={`modal${book ? ' open' : ''}`} onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <button className="modal-close" onClick={onClose}>✕</button>
      {book && (
        <div onClick={(e) => e.stopPropagation()}>
          <Book book={book} />
        </div>
      )}
    </div>
  );
}

// ─── Galerie ──────────────────────────────────────────────────────────────────
// Taille des vignettes (largeur × hauteur d'une couverture)
const THUMB_W = 150;
const THUMB_H = Math.round(THUMB_W * BOOK_RATIO);

// ─── Application Principale ──────────────────────────────────────────────────
function App() {
  const mainBook = BOOKS[0];
  return <Book book={mainBook} />;
}
