<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager – Thibaud Pagès</title>
  <link href="config.yaml" type="text/yaml" rel="cms-config-url">

  <!-- Fonts identiques au site pour un rendu fidèle -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
  /* ════════════════════════════════════════════════════════════
     PREVIEW PERSONNALISÉ POUR LA COLLECTION "PROJETS"
     Affiche fidèlement vignette + modal avec toggle de vue
     et sélecteur de thème (Crème/Encre/Sauge/Nuit/Blanc).
     ════════════════════════════════════════════════════════════ */

  // Charge le style du site dans l'iframe de preview pour rendu fidèle
  CMS.registerPreviewStyle('/style.css');

  // Style additionnel spécifique à la preview (toggle, sélecteur de thème)
  CMS.registerPreviewStyle(`
    .preview-controls {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.5rem;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      font-family: 'Outfit', sans-serif;
      flex-wrap: wrap;
    }
    .preview-controls-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--mid);
    }
    .preview-view-toggle {
      display: flex;
      gap: 4px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px;
    }
    .preview-view-toggle button {
      border: none;
      background: transparent;
      color: var(--mid);
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .preview-view-toggle button.active {
      background: var(--fg);
      color: var(--bg);
    }
    .preview-theme-toggle {
      display: flex;
      gap: 6px;
    }
    .preview-theme-toggle button {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      cursor: pointer;
      padding: 0;
      transition: transform 0.2s, border-color 0.2s;
    }
    .preview-theme-toggle button:hover { transform: scale(1.15); }
    .preview-theme-toggle button.active {
      border-color: var(--fg);
      box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px var(--fg);
    }
    .preview-wrapper {
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }
    .preview-card-stage {
      padding: 2rem;
      display: flex;
      justify-content: center;
    }
    .preview-card-stage .project-card {
      max-width: 420px;
      width: 100%;
      cursor: default;
    }
    .preview-card-stage .card-body {
      transform: translateY(0);
      opacity: 1;
    }
    .preview-modal-stage {
      padding: 1.5rem;
    }
    .preview-modal-stage .project-modal-inner {
      background: var(--card);
      border-radius: 8px;
      padding: 2rem;
      max-width: 900px;
      margin: 0 auto;
    }
    .preview-modal-stage .project-modal-cat {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 0.5rem;
    }
    .preview-modal-stage .project-modal-title {
      font-family: 'Outfit', sans-serif;
      font-size: 32px;
      font-weight: 700;
      margin: 0.2rem 0 0.4rem;
      color: var(--fg);
    }
    .preview-modal-stage .project-modal-year {
      font-size: 14px;
      color: var(--mid);
      margin-bottom: 1.5rem;
    }
    .preview-modal-stage .project-modal-description {
      font-size: 16px;
      line-height: 1.6;
      color: var(--fg);
      margin-bottom: 2rem;
    }
    .preview-modal-stage .project-modal-images {
      margin-top: 1.5rem;
    }
    .preview-modal-stage .carousel-track {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .preview-modal-stage .carousel-slide {
      flex: 1 1 280px;
      max-width: 100%;
    }
    .preview-modal-stage .carousel-slide img,
    .preview-modal-stage .carousel-slide video {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 4px;
    }
    .preview-modal-stage .project-modal-reader {
      width: 100%;
      aspect-ratio: 1 / 1.4;
      max-height: 600px;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .preview-modal-stage .project-modal-reader iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .preview-empty {
      padding: 3rem;
      text-align: center;
      color: var(--mid);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
    }
  `);

  // ── Palettes (copie de CONFIG.themes côté site) ─────────────
  const PREVIEW_THEMES = {
    'Crème':  { swatch: '#FFFDF2', bg: '#FFFDF2', fg: '#2A2A24', border: '#D8D0C0', mid: '#8A8678', card: '#EDE8DC' },
    'Encre':  { swatch: '#2A2A24', bg: '#2A2A24', fg: '#F5F0E8', border: '#444438', mid: '#9A9A88', card: '#3A3A30' },
    'Sauge':  { swatch: '#E8EDE4', bg: '#E8EDE4', fg: '#2A3424', border: '#C8D4C0', mid: '#728060', card: '#DDE5D8' },
    'Nuit':   { swatch: '#1C2B3A', bg: '#1C2B3A', fg: '#E8F0F8', border: '#2E4258', mid: '#7A9AB8', card: '#243444' },
    'Blanc':  { swatch: '#ffffff', bg: '#ffffff', fg: '#1a1a1a', border: '#e0e0e0', mid: '#888888', card: '#f5f5f5' },
  };

  // Cherche dans tous les widgets-fields le champ "projects" (qui est une List)
  // Le preview reçoit l'entry entière (l'objet projets-list), pas un projet unique.
  // On affiche le PREMIER projet de la liste pour la preview, ou un message si vide.

  const ProjectPreview = createClass({
    getInitialState: function() {
      return {
        view: 'card',
        theme: 'Crème',
      };
    },

    setView: function(view) {
      this.setState({ view: view });
    },

    setTheme: function(theme) {
      this.setState({ theme: theme });
    },

    // Récupère le projet à prévisualiser : le premier de la liste s'il y en a un
    getCurrentProject: function() {
      const entry = this.props.entry;
      const data = entry.getIn(['data']);
      if (!data) return null;

      const projects = data.get('projects');
      if (!projects || projects.size === 0) return null;

      // Le premier projet de la liste (Decap n'expose pas l'index actif facilement,
      // donc on prend le premier comme convention)
      return projects.get(0).toJS();
    },

    // Résout l'URL d'une image : si c'est un upload récent non encore committé,
    // on utilise getAsset pour récupérer un blob URL local
    resolveImage: function(path) {
      if (!path) return '';
      // Si c'est déjà une URL absolue (http/https), on la garde
      if (/^https?:\/\//.test(path)) return path;
      // Sinon, on demande à Decap de résoudre via getAsset
      const asset = this.props.getAsset(path);
      return asset ? asset.toString() : path;
    },

    renderCard: function(project) {
      const { theme } = this.state;
      const t = PREVIEW_THEMES[theme];
      const crop = {
        zoom: project.cropZoom != null ? project.cropZoom : 1.1,
        x:    project.cropX    != null ? project.cropX    : 50,
        y:    project.cropY    != null ? project.cropY    : 50,
      };

      const imageUrl = this.resolveImage(project.image);
      const isVideo = imageUrl && /\.(mp4|webm|mov)$/i.test(imageUrl);

      return h('div', { className: 'preview-card-stage' },
        h('a', {
          className: 'project-card',
          href: '#',
          style: {
            '--zoom': crop.zoom,
            '--crop-x': crop.x + '%',
            '--crop-y': crop.y + '%',
          },
          onClick: function(e) { e.preventDefault(); }
        },
          h('div', { className: 'card-img' },
            imageUrl
              ? (isVideo
                  ? h('video', { src: imageUrl, muted: true, loop: true, autoPlay: true, playsInline: true })
                  : h('img', { src: imageUrl, alt: project.title || '' })
                )
              : h('span', null, 'Vignette manquante')
          ),
          h('div', { className: 'card-body' },
            h('div', { className: 'card-cat' }, project.cat || ''),
            h('div', { className: 'card-title' }, project.title || 'Sans titre'),
            h('div', { className: 'card-year' }, project.year || '')
          )
        )
      );
    },

    renderModal: function(project) {
      const description = project.description || '';
      const hasReader = project.reader && project.reader.url;

      // Galerie d'images (médias)
      const images = Array.isArray(project.images) ? project.images : [];
      const galleryItems = images
        .map(item => typeof item === 'string' ? item : (item && item.media))
        .filter(Boolean);

      const self = this;

      return h('div', { className: 'preview-modal-stage' },
        h('div', { className: 'project-modal-inner' },
          h('div', { className: 'project-modal-cat' }, project.cat || ''),
          h('h2', { className: 'project-modal-title' }, project.title || 'Sans titre'),
          h('div', { className: 'project-modal-year' }, project.year || ''),
          description ? h('p', { className: 'project-modal-description' }, description) : null,

          // Si reader interactif (HopiReader), on affiche l'iframe
          hasReader
            ? h('div', { className: 'project-modal-reader' },
                h('iframe', { src: project.reader.url, title: project.title, allowFullScreen: true })
              )
            : (galleryItems.length > 0
                ? h('div', { className: 'project-modal-images' },
                    h('div', { className: 'carousel-track' },
                      galleryItems.map(function(src, i) {
                        const resolvedSrc = self.resolveImage(src);
                        const isVid = /\.(mp4|webm|mov)$/i.test(resolvedSrc);
                        return h('div', {
                            key: i,
                            className: 'carousel-slide' + (i === 0 ? ' active' : '')
                          },
                          isVid
                            ? h('video', { src: resolvedSrc, controls: true, muted: true, loop: true, playsInline: true })
                            : h('img', { src: resolvedSrc, alt: project.title || '' })
                        );
                      })
                    )
                  )
                : null
              )
        )
      );
    },

    render: function() {
      const project = this.getCurrentProject();
      const { view, theme } = this.state;
      const t = PREVIEW_THEMES[theme];

      // Inline les variables CSS du thème dans le wrapper de preview
      const wrapperStyle = {
        '--bg': t.bg,
        '--fg': t.fg,
        '--border': t.border,
        '--mid': t.mid,
        '--card': t.card,
        background: t.bg,
        color: t.fg,
      };

      const self = this;

      return h('div', { className: 'preview-wrapper', style: wrapperStyle },

        // Contrôles : toggle vue + sélecteur de thème
        h('div', { className: 'preview-controls' },
          h('span', { className: 'preview-controls-label' }, 'Vue'),
          h('div', { className: 'preview-view-toggle' },
            h('button', {
              className: view === 'card' ? 'active' : '',
              onClick: function() { self.setView('card'); }
            }, 'Vignette'),
            h('button', {
              className: view === 'modal' ? 'active' : '',
              onClick: function() { self.setView('modal'); }
            }, 'Modal')
          ),
          h('span', { className: 'preview-controls-label', style: { marginLeft: '1rem' } }, 'Thème'),
          h('div', { className: 'preview-theme-toggle' },
            Object.keys(PREVIEW_THEMES).map(function(name) {
              const tt = PREVIEW_THEMES[name];
              return h('button', {
                key: name,
                className: theme === name ? 'active' : '',
                style: { background: tt.swatch },
                title: name,
                onClick: function() { self.setTheme(name); }
              });
            })
          )
        ),

        // Contenu : projet ou message si vide
        project
          ? (view === 'card' ? this.renderCard(project) : this.renderModal(project))
          : h('div', { className: 'preview-empty' },
              'Ajoute au moins un projet à la liste pour voir l\'aperçu. ',
              h('br'),
              'L\'aperçu affiche toujours le PREMIER projet de la liste.'
            )
      );
    }
  });

  // Enregistre le template pour la collection "projets" → fichier "projets-list"
  CMS.registerPreviewTemplate('projets-list', ProjectPreview);
  </script>
</body>
</html>
