backend:
  name: git-gateway
  repo: thibaudps/thibaudpages
  branch: master
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/36dc7e8e-8f5d-48c9-a36a-dda795f34f64/pkce
  auth_token_endpoint: /sites/36dc7e8e-8f5d-48c9-a36a-dda795f34f64/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: 'Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    update: 'Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    delete: 'Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    uploadMedia: 'Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    deleteMedia: 'Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    openAuthoring: 'Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge'

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg

site_url: https://thibaudpages.com
display_url: https://thibaudpages.com

media_folder: "public/images/projects"
public_folder: "/public/images/projects"

locale: "fr"

collections:
  - name: "projets"
    label: "Projets"
    label_singular: "Projet"
    description: "La liste de tous tes projets, dans l'ordre d'affichage sur le site."
    files:
      - name: "projets-list"
        label: "Liste des projets"
        file: "data/projets.json"
        format: "json"
        fields:
          - label: "Projets"
            name: "projects"
            widget: "list"
            label_singular: "projet"
            summary: "{{fields.title}} — {{fields.cat}} ({{fields.year}})"
            fields:
              - { label: "Titre (FR)", name: "title", widget: "string" }
              - { label: "Titre (EN)", name: "titleEn", widget: "string" }
              - label: "Catégorie"
                name: "cat"
                widget: "select"
                options: ["Identity", "Print", "Illustration", "Edition", "Web"]
              - { label: "Année", name: "year", widget: "string", hint: "Ex: 2026" }
              - label: "Image vignette"
                name: "image"
                widget: "image"
                hint: "L'image affichée dans la grille de projets."
              - label: "Zoom de la vignette"
                name: "cropZoom"
                widget: "number"
                value_type: "float"
                default: 1.1
                min: 1
                max: 3
                step: 0.1
                hint: "1 = image entière, 2 = très zoomé. Tester 1.1, 1.4, 1.9..."
              - label: "Position horizontale (x)"
                name: "cropX"
                widget: "number"
                value_type: "int"
                default: 50
                min: 0
                max: 100
                hint: "Position du centre du cadrage de gauche (0) à droite (100). 50 = centré."
              - label: "Position verticale (y)"
                name: "cropY"
                widget: "number"
                value_type: "int"
                default: 50
                min: 0
                max: 100
                hint: "Position du centre du cadrage de haut (0) à bas (100). 50 = centré."
              - label: "Lien externe (optionnel)"
                name: "href"
                widget: "string"
                required: false
                default: "#"
                hint: "Laisser '#' pour ouvrir le modal du site. Sinon, URL externe."
              - label: "🛒 Print disponible à l'achat"
                name: "onSale"
                widget: "boolean"
                default: false
                required: false
                hint: "Cocher pour afficher la pastille 'Print disponible' sur la vignette et le bouton d'achat dans le modal."
              - label: "Prix"
                name: "price"
                widget: "string"
                required: false
                hint: "Ex: 45€ — affiché sur le bouton d'achat. Uniquement si 'Print disponible' est coché."
              - label: "Lien Stripe Payment Link"
                name: "stripeUrl"
                widget: "string"
                required: false
                hint: "URL Stripe (https://buy.stripe.com/...). Uniquement si 'Print disponible' est coché."
              - label: "Description (FR)"
                name: "description"
                widget: "markdown"
                buttons: ["bold", "italic", "link", "bulleted-list"]
                editor_components: []
                modes: ["rich_text"]
                hint: "Tu peux utiliser **gras**, *italique*, [liens](https://exemple.com), et des listes."
              - label: "Description (EN)"
                name: "descriptionEn"
                widget: "markdown"
                buttons: ["bold", "italic", "link", "bulleted-list"]
                editor_components: []
                modes: ["rich_text"]
                hint: "Use **bold**, *italic*, [links](https://example.com), and lists."
              - label: "Images / vidéos de la galerie"
                name: "images"
                widget: "list"
                required: false
                summary: "{{fields.media}}"
                hint: "Ajoute autant d'images ou de vidéos (.webm) que tu veux. Glisser-déposer pour réorganiser."
                fields:
                  - label: "Média"
                    name: "media"
                    widget: "file"
                    media_library:
                      config:
                        multiple: false
              - label: "Livre interactif (optionnel)"
                name: "reader"
                widget: "object"
                required: false
                collapsed: true
                hint: "Pour les projets de type livre feuilletable (comme Hopi). Laisser vide sinon."
                fields:
                  - label: "Chemin du reader HTML"
                    name: "url"
                    widget: "string"
                    required: false
                    hint: "Ex: public/images/projects/hopi/HopiReader.html"
                  - label: "Ratio des pages (largeur / hauteur)"
                    name: "ratio"
                    widget: "number"
                    value_type: "float"
                    required: false
                    default: 0.7
                    step: 0.01
                    hint: "Ex: 0.7 pour un livre portrait. Utilisé pour calculer la taille du modal."

  - name: "contenu"
    label: "Contenu du site"
    label_singular: "Contenu"
    description: "Textes et infos des pages Accueil, À propos, Contact + navigation et musique."
    files:
      - name: "site"
        label: "Pages & contenus généraux"
        file: "data/site.json"
        format: "json"
        fields:
          # ── Général / Identité ──
          - { label: "Nom complet", name: "name", widget: "string", hint: "Affiché en majuscules dans la nav et l'accueil." }
          - { label: "Nom court", name: "nameShort", widget: "string", hint: "Version abrégée (ex: TPD)." }
          - { label: "Tagline (FR)", name: "tagline", widget: "string" }
          - { label: "Tagline (EN)", name: "taglineEn", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Bouton d'appel à l'action", name: "ctaLabel", widget: "string", hint: "Ex: Voir les projets" }
          - { label: "URL affichée", name: "url", widget: "string", hint: "Ex: thibaudpages.com (texte affiché, pas un lien)." }
          - { label: "Mention de pied de page", name: "location", widget: "string", hint: "Ex: Made by yours truly in 2026" }

          # ── Titre d'accueil ──
          - label: "Titre d'accueil (hero)"
            name: "heroTitle"
            widget: "string"
            hint: "HTML autorisé : <br> = retour à la ligne, <em>…</em> = italique."

          # ── Navigation ──
          - label: "Navigation"
            name: "nav"
            widget: "list"
            summary: "{{fields.label}} → {{fields.href}}"
            fields:
              - { label: "Libellé", name: "label", widget: "string" }
              - { label: "Lien (fichier)", name: "href", widget: "string", hint: "Ex: projets.html, about.html, contact.html" }

          # ── Musique ──
          - label: "Musique d'ambiance"
            name: "music"
            widget: "object"
            fields:
              - { label: "Fichier audio", name: "file", widget: "string", hint: "Chemin, ex: public/music/chill.mp3" }
              - { label: "Artiste", name: "artist", widget: "string" }
              - { label: "Titre", name: "title", widget: "string" }

          # ── Page À propos ──
          - label: "Page — À propos"
            name: "about"
            widget: "object"
            fields:
              - { label: "Suffixe nav (FR)", name: "suffix", widget: "string", hint: "Petit texte à droite du nom dans la nav." }
              - { label: "Suffixe nav (EN)", name: "suffixEn", widget: "string" }
              - { label: "Image (portrait)", name: "image", widget: "string", hint: "Chemin de l'image, ex: public/images/portrait.webp. Vide = aucune image." }
              - label: "Paragraphes (FR)"
                name: "paragraphs"
                widget: "list"
                field: { label: "Paragraphe", name: "paragraph", widget: "text" }
                hint: "Un paragraphe par entrée. HTML autorisé : <strong>…</strong> pour le gras."
              - label: "Paragraphes (EN)"
                name: "paragraphsEn"
                widget: "list"
                field: { label: "Paragraph", name: "paragraph", widget: "text" }
                hint: "One paragraph per entry. HTML allowed: <strong>…</strong>."

          # ── Page Contact ──
          - label: "Page — Contact"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Suffixe nav (FR)", name: "suffix", widget: "string" }
              - { label: "Suffixe nav (EN)", name: "suffixEn", widget: "string" }
              - { label: "Titre (FR)", name: "headline", widget: "string", hint: "HTML autorisé : <br>, <em>, &nbsp;" }
              - { label: "Titre (EN)", name: "headlineEn", widget: "string", hint: "HTML autorisé." }
              - label: "Sections"
                name: "sections"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - { label: "Titre (FR)", name: "title", widget: "string" }
                  - { label: "Titre (EN)", name: "titleEn", widget: "string" }
                  - { label: "Email", name: "email", widget: "string", required: false, hint: "Pour une section de type contact email." }
                  - { label: "Lien", name: "link", widget: "string", required: false, hint: "Pour une section avec un lien (ex: Instagram)." }
                  - { label: "Libellé du lien", name: "linkLabel", widget: "string", required: false }
